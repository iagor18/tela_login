<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Login</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=login" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=key" />

    <link rel="stylesheet" href="estilos/estilo.css">
    <link rel="stylesheet" href="estilos/media-query.css">
    <link rel="stylesheet" href="estilos/landscape.css">
</head>

<body>
    <main>
        <section id="login">
            <div id="imagem">
                
            </div>
            
            <div id="formulario">
                <h1>Loguin</h1>
                <p>Seja bem Vindo(a) novamente.
                    Faça login para acessar sua conta e poder fazer as configurações no seu ambiente.
                </p>
            <form action="login.php" method="">

                <div class="campo">
                    <span class="material-symbols-outlined">login</span>
                    <input type="email" name="login" id="ilogin" required placeholder="Digite seu email">
                    <label for="iloguin">Login</label>
                </div>
                <div class="campo">
                    <span class="material-symbols-outlined">key</span>           
                    <input type="password" name="senha" id="isenha" required placeholder="Digite sua senha">
                    <label for="isenha">Senha</label>
                </div>
                <input type="submit" value="Entrar">

            </form>
            </div>
        </section>
    </main>
    
</body>
</html>
